<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noelle West — Send to Laundry Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-wrapper">

  <div class="app-header">
    <h1>🧴 Send to Laundry Shop</h1>
    <p>Group items into bags — weigh each bag as a whole</p>
    <div id="loadingBanner" style="display:none;">⏳ Loading inventory…</div>
    <div id="sourceBadge"></div>
  </div>

  <!-- Step 1: Number of bags -->
  <div class="card">
    <div class="card-title">How many bags?</div>
    <div class="bag-count-row">
      <input type="number" id="numBagsInput" min="1" max="30" value="1" class="bag-count-input" />
      <button class="btn btn-primary" onclick="onSetBags()">Set Bags ➜</button>
    </div>
  </div>

  <!-- Bags rendered here -->
  <div id="bagsContainer"></div>

  <!-- Grand Totals -->
  <div class="card" id="grandTotalsCard" style="display:none;">
    <div class="card-title">📊 Grand Totals</div>
    <div class="grand-totals-row">
      <div class="grand-total-box">
        <div class="gt-label">Total Bags</div>
        <div class="gt-value" id="gtBags">0</div>
      </div>
      <div class="grand-total-box">
        <div class="gt-label">Total Items</div>
        <div class="gt-value" id="gtItems">0</div>
      </div>
      <div class="grand-total-box">
        <div class="gt-label">Total Weight</div>
        <div class="gt-value" id="gtWeight">0.000 kg</div>
      </div>
    </div>
  </div>

  <div class="app-footer">Noelle West • Send to Laundry Shop</div>
</div>
<script src="app.js?v=1"></script>
</body>
</html>
