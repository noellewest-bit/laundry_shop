<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noelle West — Send to Laundry Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-wrapper">

  <div class="app-header">
    <h1>🧴 Send to Laundry Shop</h1>
    <div id="loadingBanner" style="display:none;">⏳ Loading inventory…</div>
    <div id="sourceBadge"></div>
  </div>

  <!-- Bag count + Set -->
  <div class="card setup-card">
    <div class="setup-row">
      <label for="numBagsInput">Number of bags:</label>
      <input type="number" id="numBagsInput" min="1" max="30" value="1" class="bag-count-input" />
      <button class="btn btn-primary" onclick="onSetBags()">Set Bags ➜</button>
    </div>
  </div>

  <!-- Accordion bags -->
  <div id="bagsContainer"></div>

  <!-- Grand Totals -->
  <div class="card totals-card" id="grandTotalsCard" style="display:none;">
    <div class="totals-row">
      <div class="total-chip">
        <span class="tc-label">Bags</span>
        <span class="tc-value" id="gtBags">0</span>
      </div>
      <div class="total-chip">
        <span class="tc-label">Items</span>
        <span class="tc-value" id="gtItems">0</span>
      </div>
      <div class="total-chip total-chip-wide">
        <span class="tc-label">Total Weight</span>
        <span class="tc-value" id="gtWeight">0.000 kg</span>
      </div>
    </div>
  </div>

  <div class="app-footer">Noelle West • Send to Laundry Shop</div>
</div>
<script src="app.js?v=6"></script>
</body>
</html>
